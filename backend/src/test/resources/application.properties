# 1. Desativa o Flyway completamente durante os testes
spring.flyway.enabled=false

# 2. Força o Hibernate a criar as tabelas na memória baseado nas suas classes @Entity
spring.jpa.hibernate.ddl-auto=create-drop

# 3. Garante que o Spring use o banco H2 em memória isolado para o teste
spring.datasource.url=jdbc:h2:mem:salonflow_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver