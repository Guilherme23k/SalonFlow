services:
  postgres:
    image: postgres:15-alpine
    container_name: salonflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: salonflow
      POSTGRES_USER: salonflow
      POSTGRES_PASSWORD: salonflow
    volumes:
      - salonflow-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salonflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salonflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salonflow-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/salonflow
      SPRING_DATASOURCE_USERNAME: salonflow
      SPRING_DATASOURCE_PASSWORD: salonflow
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - salonflow-network
    # Não expõe porta para fora — só acessível internamente

bff:
  build:
    context: ./bff
    dockerfile: Dockerfile
  container_name: salonflow-bff
  restart: unless-stopped
  environment:
    BACKEND_URL: http://backend:8080
    INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    PORT: 3000
  ports:
    - "3000:3000"
  depends_on:
    - backend
  networks:
    - salonflow-network

volumes:
  salonflow-db:

networks:
  salonflow-network:
    driver: bridge
